<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAuto - Download Center</title>
    <style>
        /* Modern, minimal reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117; /* Sleek dark background */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #161b22; /* Slightly lighter card background */
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        /* FAuto Logo Styling */
        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .logo .f-letter {
            color: #1f6feb; /* Deep Blue */
        }
        .logo .auto-text {
            color: #ffffff; /* White */
        }

        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #58a6ff;
            margin-bottom: 15px;
            text-align: left;
            font-weight: 600;
        }

        .download-group {
            margin-bottom: 30px;
        }

        /* Simple Aesthetic Buttons */
        .btn {
            display: block;
            width: 100%;
            background-color: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #30363d;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
            color: #ffffff;
        }

        /* Accent button for the ZIP main file */
        .btn-accent {
            background-color: #1f6feb;
            color: #ffffff;
            border: 1px solid transparent;
        }

        .btn-accent:hover {
            background-color: #388bfd;
            border-color: transparent;
            color: #ffffff;
        }

        .file-info {
            font-size: 11px;
            color: #8b949e;
            margin-top: -8px;
            margin-bottom: 16px;
            text-align: left;
            padding-left: 2px;
        }
    </style>
</head>
<body>

<div class="container">

            Download ZIP Archive
        </a>
        <div class="file-info">Size: 250MB • Compressed Folder</div>
    </div>
</div>

</body>
</html>
